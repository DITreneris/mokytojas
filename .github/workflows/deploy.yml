# GitHub Pages deploy - DI Pamoku Kurejas (statine HTML)
# Reikalavimas: Repo Settings -> Pages -> Build and deployment: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run full quality gates
        run: npm run test:mixed
        env:
          CI: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/config
          cp index.html privatumas.html style.css generator.js copy.js favicon.svg _site/
          cp config/sot.json _site/config/sot.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
